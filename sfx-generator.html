<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SFX Generátor · madebygeszti</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: radial-gradient(1200px 600px at 50% -10%, #1a1030 0%, #0a0812 45%, #060509 100%);
    color: #e9e4f5;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    padding: 24px 16px 48px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header { margin-bottom: 28px; display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  h1 {
    font-size: clamp(28px, 6vw, 42px); font-weight: 800;
    letter-spacing: -0.02em; line-height: 1.05;
    text-shadow: 0 0 30px #b79cff55;
  }
  .credit {
    font-size: 13px; font-weight: 700; letter-spacing: 0.08em;
    color: #b79cff; text-shadow: 0 0 12px #b79cff66;
  }
  .cats {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px; margin-bottom: 24px;
  }
  .cat-btn {
    padding: 12px 10px; border-radius: 10px; cursor: pointer;
    border: 1px solid #2a2340; background: #120e1e; color: #a89cc8;
    font-weight: 700; font-size: 13px; text-align: left;
    font-family: inherit; transition: all .15s;
  }
  .cat-btn.active {
    border-color: #b79cff;
    background: linear-gradient(180deg, #b79cff22, #b79cff0d);
    color: #fff; box-shadow: 0 0 18px #b79cff33;
  }
  .panel {
    background: #100c1c; border: 1px solid #251d3a;
    border-radius: 16px; padding: 22px 20px;
    box-shadow: 0 20px 60px #00000066;
  }
  .panel-title { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
  .panel-desc { color: #8d82ad; font-size: 13px; margin-bottom: 16px; }
  .variants { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
  .var-btn {
    padding: 6px 14px; border-radius: 999px; cursor: pointer;
    font-size: 13px; font-weight: 600; font-family: inherit;
    border: 1px solid #2e2648; background: transparent; color: #b3a8d6;
    transition: all .15s;
  }
  .var-btn.active { border-color: #b79cff; background: #b79cff; color: #14102a; }
  .wave {
    height: 90px; border-radius: 10px; margin-bottom: 20px;
    background: #0a0714; border: 1px solid #201936;
    position: relative; overflow: hidden;
  }
  .wave canvas { width: 100%; height: 100%; display: block; }
  .wave .placeholder {
    position: absolute; inset: 0; display: flex;
    align-items: center; justify-content: center;
    color: #4d4370; font-size: 12px; letter-spacing: 0.1em; text-align: center; padding: 0 12px;
  }
  .sliders { display: grid; gap: 16px; margin-bottom: 24px; }
  .slider-head {
    display: flex; justify-content: space-between;
    font-size: 12px; margin-bottom: 6px; color: #b3a8d6; font-weight: 600;
  }
  .slider-val { color: #b79cff; font-variant-numeric: tabular-nums; }
  input[type=range] { width: 100%; accent-color: #b79cff; cursor: pointer; }
  .actions { display: flex; flex-wrap: wrap; gap: 10px; }
  .btn {
    padding: 14px 20px; border-radius: 12px; cursor: pointer;
    font-size: 14px; font-weight: 700; font-family: inherit; border: none;
  }
  .btn-play {
    flex: 1 1 160px; font-size: 15px; font-weight: 800;
    background: linear-gradient(135deg, #b79cff, #7c5fd4);
    color: #120d24; letter-spacing: 0.02em;
    box-shadow: 0 0 24px #b79cff55;
  }
  .btn-rand { flex: 1 1 140px; border: 1px solid #372c58; background: #181228; color: #cfc4ee; }
  .btn-dl { flex: 1 1 140px; border: 1px solid #7c5fd4; background: transparent; color: #b79cff; }
  .btn:disabled { opacity: 0.6; }
  footer { margin-top: 20px; font-size: 12px; color: #5d527f; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>SFX GENERÁTOR</h1>
    <span class="credit">madebygeszti</span>
  </header>
  <div class="cats" id="cats"></div>
  <div class="panel">
    <div class="panel-title" id="catName"></div>
    <div class="panel-desc" id="catDesc"></div>
    <div class="variants" id="variants"></div>
    <div class="wave">
      <canvas id="waveCanvas"></canvas>
      <div class="placeholder" id="wavePh">LEJÁTSZÁS UTÁN ITT JELENIK MEG A HULLÁMFORMA</div>
    </div>
    <div class="sliders" id="sliders"></div>
    <div class="actions">
      <button class="btn btn-play" id="btnPlay">▶ Lejátszás</button>
      <button class="btn btn-rand" id="btnRand">🎲 Véletlen variáció</button>
      <button class="btn btn-dl" id="btnDl">⬇ WAV letöltés</button>
    </div>
  </div>
  <footer>44,1 kHz · 16 bit sztereó WAV · A generált hangok szabadon felhasználhatók és értékesíthetők</footer>
</div>
<script>
const SR = 44100;

/* ---------- segédfüggvények ---------- */

function makeNoise(ctx, dur) {
  const len = Math.max(1, Math.ceil(ctx.sampleRate * dur));
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  return buf;
}

function noiseSrc(ctx, dur) {
  const s = ctx.createBufferSource();
  s.buffer = makeNoise(ctx, dur);
  return s;
}

// rövid zaj-lövés sáváteresztő szűrővel (kattanások, klikkek alapja)
function noiseBurst(ctx, t, dur, fc, q, gainVal, dest) {
  const src = noiseSrc(ctx, dur + 0.02);
  const bp = ctx.createBiquadFilter();
  bp.type = "bandpass";
  bp.frequency.value = fc;
  bp.Q.value = q;
  const g = ctx.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(gainVal, t + 0.002);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  src.connect(bp).connect(g).connect(dest);
  src.start(t);
}

// lecsengő szinusz részhang (fémes / harang hangok alapja)
function partial(ctx, t, freq, dur, gainVal, dest, type = "sine") {
  const o = ctx.createOscillator();
  o.type = type;
  o.frequency.value = freq;
  const g = ctx.createGain();
  g.gain.setValueAtTime(gainVal, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g).connect(dest);
  o.start(t);
  o.stop(t + dur + 0.05);
}

// mély ütés (impact)
function thump(ctx, t, f0, f1, dur, gainVal, dest) {
  const o = ctx.createOscillator();
  o.type = "sine";
  o.frequency.setValueAtTime(f0, t);
  o.frequency.exponentialRampToValueAtTime(Math.max(20, f1), t + dur);
  const g = ctx.createGain();
  g.gain.setValueAtTime(gainVal, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g).connect(dest);
  o.start(t);
  o.stop(t + dur + 0.05);
}

function softClip(ctx, amount) {
  const ws = ctx.createWaveShaper();
  const n = 1024;
  const curve = new Float32Array(n);
  for (let i = 0; i < n; i++) {
    const x = (i / (n - 1)) * 2 - 1;
    curve[i] = Math.tanh(x * amount) / Math.tanh(amount);
  }
  ws.curve = curve;
  return ws;
}

// procedurális zengető: exponenciálisan lecsengő zaj impulzusválaszként
function makeReverb(ctx, dur, decayPow) {
  const len = Math.max(1, Math.ceil(ctx.sampleRate * dur));
  const ir = ctx.createBuffer(2, len, ctx.sampleRate);
  for (let c = 0; c < 2; c++) {
    const d = ir.getChannelData(c);
    for (let i = 0; i < len; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decayPow);
    }
  }
  const conv = ctx.createConvolver();
  conv.buffer = ir;
  return conv;
}

const R = (a, b) => a + Math.random() * (b - a);

/* ---------- hangkategóriák ---------- */

const CATEGORIES = [
  {
    id: "whoosh",
    name: "Whoosh",
    desc: "Átvezetésekhez, gyors vágásokhoz",
    variants: ["Low", "Mid", "High", "Airy", "Dark"],
    sliders: [
      { id: "len", label: "Hossz", min: 0.3, max: 2.2, step: 0.05, def: 0.8, unit: "s" },
      { id: "pitch", label: "Hangmagasság", min: 0.5, max: 2, step: 0.05, def: 1 },
      { id: "res", label: "Élesség", min: 1, max: 14, step: 0.5, def: 5 },
    ],
    duration: (p) => p.len + 0.15,
    build: (ctx, p) => {
      const base =
        { Low: 240, Mid: 850, High: 2400, Airy: 4200, Dark: 140 }[p.variant] * p.pitch;
      const src = noiseSrc(ctx, p.len + 0.1);
      const bp = ctx.createBiquadFilter();
      bp.type = "bandpass";
      bp.Q.value = p.res;
      bp.frequency.setValueAtTime(base * 0.35, 0);
      bp.frequency.exponentialRampToValueAtTime(base * 2.2, p.len * 0.45);
      bp.frequency.exponentialRampToValueAtTime(base * 0.5, p.len);
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.0001, 0);
      g.gain.exponentialRampToValueAtTime(0.9, p.len * 0.42);
      g.gain.exponentialRampToValueAtTime(0.0001, p.len);
      src.connect(bp).connect(g).connect(ctx.destination);
      src.start(0);
    },
  },
  {
    id: "swoosh-impact",
    name: "Swoosh + Impact",
    desc: "Title card bevillanásához, hangsúlyos vágáshoz",
    variants: ["Soft Hit", "Punch", "Deep Slam", "Snap"],
    sliders: [
      { id: "len", label: "Hossz", min: 0.5, max: 2, step: 0.05, def: 0.9, unit: "s" },
      { id: "pitch", label: "Hangmagasság", min: 0.5, max: 2, step: 0.05, def: 1 },
      { id: "hit", label: "Ütés ereje", min: 0.3, max: 1.5, step: 0.05, def: 1 },
    ],
    duration: (p) => p.len + 0.6,
    build: (ctx, p) => {
      const wLen = p.len * 0.75;
      const base = 700 * p.pitch;
      const src = noiseSrc(ctx, wLen + 0.05);
      const bp = ctx.createBiquadFilter();
      bp.type = "bandpass";
      bp.Q.value = 4;
      bp.frequency.setValueAtTime(base * 0.3, 0);
      bp.frequency.exponentialRampToValueAtTime(base * 2.5, wLen);
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.0001, 0);
      g.gain.exponentialRampToValueAtTime(0.8, wLen * 0.9);
      g.gain.linearRampToValueAtTime(0.0001, wLen + 0.02);
      src.connect(bp).connect(g).connect(ctx.destination);
      src.start(0);

      const tHit = wLen;
      const v = p.variant;
      if (v === "Soft Hit") {
        thump(ctx, tHit, 140 * p.pitch, 45, 0.35, 0.8 * p.hit, ctx.destination);
        noiseBurst(ctx, tHit, 0.1, 350, 1.2, 0.35 * p.hit, ctx.destination);
      } else if (v === "Punch") {
        thump(ctx, tHit, 180 * p.pitch, 50, 0.3, 1.0 * p.hit, ctx.destination);
        noiseBurst(ctx, tHit, 0.06, 1200, 1.5, 0.5 * p.hit, ctx.destination);
      } else if (v === "Deep Slam") {
        thump(ctx, tHit, 110 * p.pitch, 32, 0.55, 1.1 * p.hit, ctx.destination);
        noiseBurst(ctx, tHit, 0.18, 220, 1, 0.45 * p.hit, ctx.destination);
      } else {
        noiseBurst(ctx, tHit, 0.03, 2500 * p.pitch, 2, 0.9 * p.hit, ctx.destination);
        thump(ctx, tHit, 300 * p.pitch, 120, 0.12, 0.5 * p.hit, ctx.destination);
      }
    },
  },
  {
    id: "cinematic-impact",
    name: "Cinematic Impact",
    desc: "Trailer-stílusú mély becsapódások drámai pillanatokhoz",
    variants: ["Heavy Boom", "Sub Boom", "Trailer Hit", "Distant Boom", "Tight Punch"],
    sliders: [
      { id: "pitch", label: "Hangmagasság", min: 0.6, max: 1.6, step: 0.05, def: 1 },
      { id: "decay", label: "Lecsengés", min: 0.4, max: 2.4, step: 0.05, def: 1.1, unit: "s" },
      { id: "weight", label: "Súly", min: 0.3, max: 1.5, step: 0.05, def: 1 },
    ],
    duration: (p) => p.decay + 1.4,
    build: (ctx, p) => {
      const v = p.variant;
      const D = v === "Tight Punch" ? p.decay * 0.45 : p.decay;
      const verb = makeReverb(ctx, 1.3, 2.1);
      const wet = ctx.createGain();
      wet.gain.value = v === "Distant Boom" ? 0.9 : 0.4;
      verb.connect(wet).connect(ctx.destination);
      const out = (n) => { n.connect(ctx.destination); n.connect(verb); };
      const t = 0.02;

      // mély test: rövid lecsúszás a végleges frekvenciára, majd lassú süllyedés
      const bf = (v === "Sub Boom" ? 68 : 88) * p.pitch;
      const body = ctx.createOscillator();
      body.type = "sine";
      body.frequency.setValueAtTime(bf * 2.2, t);
      body.frequency.exponentialRampToValueAtTime(bf, t + 0.09);
      body.frequency.exponentialRampToValueAtTime(bf * 0.7, t + D);
      const bg = ctx.createGain();
      bg.gain.setValueAtTime(1.0 * p.weight, t);
      bg.gain.exponentialRampToValueAtTime(0.0001, t + D);
      let chain = body;
      if (p.weight > 1.05) {
        const ws = softClip(ctx, 1 + p.weight);
        body.connect(ws);
        chain = ws;
      }
      chain.connect(bg);
      out(bg);
      body.start(t);
      body.stop(t + D + 0.1);

      // morajlás a test alatt
      const ns = noiseSrc(ctx, D);
      const lp = ctx.createBiquadFilter();
      lp.type = "lowpass";
      lp.frequency.value = v === "Distant Boom" ? 90 : 140;
      const ng = ctx.createGain();
      ng.gain.setValueAtTime(0.5 * p.weight, t);
      ng.gain.exponentialRampToValueAtTime(0.0001, t + D * 0.9);
      ns.connect(lp).connect(ng);
      out(ng);
      ns.start(t);

      // fényes tranziens az elején
      if (v === "Heavy Boom" || v === "Tight Punch") {
        noiseBurst(ctx, t, 0.02, 2400 * p.pitch, 1.8, 0.5 * p.weight, ctx.destination);
      }
      // fémes csattanás a trailer hithez
      if (v === "Trailer Hit") {
        const cb = 880 * p.pitch;
        [[1, 0.4], [2.42, 0.22], [3.91, 0.12]].forEach(([r, g]) =>
          partial(ctx, t, cb * r, 0.3, g, verb)
        );
        [[1, 0.3], [2.42, 0.15]].forEach(([r, g]) =>
          partial(ctx, t, cb * r, 0.18, g, ctx.destination)
        );
      }
    },
  },
  {
    id: "riser",
    name: "Riser",
    desc: "Feszültségépítés CTA vagy punchline előtt",
    variants: ["Noise Riser", "Tonal Riser", "Hybrid + Hit", "Metallic", "Synth Cluster"],
    sliders: [
      { id: "len", label: "Hossz", min: 0.8, max: 4, step: 0.1, def: 1.8, unit: "s" },
      { id: "pitch", label: "Hangmagasság", min: 0.5, max: 2, step: 0.05, def: 1 },
      { id: "tension", label: "Feszültség", min: 0.3, max: 1.5, step: 0.05, def: 1 },
    ],
    duration: (p) => {
      if (p.variant === "Metallic" || p.variant === "Synth Cluster") return p.len + 1.8;
      return p.len + (p.variant === "Hybrid + Hit" ? 0.6 : 0.1);
    },
    build: (ctx, p) => {
      const L = p.len;
      const v = p.variant;

      // — zengetett variánsok (fémes / detuned szinti, csúcs után lecsengő tail) —
      if (v === "Metallic" || v === "Synth Cluster") {
        const verb = makeReverb(ctx, 1.7, 2.4);
        const wet = ctx.createGain();
        wet.gain.value = 0.55;
        verb.connect(wet).connect(ctx.destination);
        const out = (n) => { n.connect(ctx.destination); n.connect(verb); };

        if (v === "Metallic") {
          // szub-drón az egész alatt
          const sub = ctx.createOscillator();
          sub.type = "sine";
          sub.frequency.setValueAtTime(58 * p.pitch, 0);
          sub.frequency.linearRampToValueAtTime(82 * p.pitch, L);
          const sg = ctx.createGain();
          sg.gain.setValueAtTime(0.001, 0);
          sg.gain.exponentialRampToValueAtTime(0.55, L);
          sg.gain.exponentialRampToValueAtTime(0.0001, L + 0.9);
          sub.connect(sg);
          out(sg);
          sub.start(0);
          sub.stop(L + 1);
          // inharmonikus, fémes részhangok — emelkedő hangolással
          const base = 370 * p.pitch;
          [[1, 0.16], [2.25, 0.11], [2.8, 0.09], [4.3, 0.07], [5.7, 0.05], [11.3, 0.03]]
            .forEach(([r, g0]) => {
              const o = ctx.createOscillator();
              o.type = "sine";
              o.frequency.setValueAtTime(base * r * 0.72, 0);
              o.frequency.exponentialRampToValueAtTime(base * r * 1.28, L);
              const g = ctx.createGain();
              g.gain.setValueAtTime(0.0008, 0);
              g.gain.exponentialRampToValueAtTime(g0 * p.tension, L);
              g.gain.exponentialRampToValueAtTime(0.0001, L + 0.5);
              o.connect(g);
              out(g);
              o.start(0);
              o.stop(L + 0.7);
            });
          // fényes zaj-shimmer felfelé
          const ns = noiseSrc(ctx, L + 0.1);
          const hp = ctx.createBiquadFilter();
          hp.type = "highpass";
          hp.frequency.setValueAtTime(1500, 0);
          hp.frequency.exponentialRampToValueAtTime(5200, L);
          const ng = ctx.createGain();
          ng.gain.setValueAtTime(0.001, 0);
          ng.gain.exponentialRampToValueAtTime(0.14 * p.tension, L);
          ng.gain.linearRampToValueAtTime(0.0001, L + 0.05);
          ns.connect(hp).connect(ng);
          out(ng);
          ns.start(0);
        } else {
          // Synth Cluster: lebegő, detuned fűrészfog-fürt felfelé glisszandóval
          const f0 = 200 * p.pitch;
          [1, 1.048, 0.952, 1.005].forEach((m) => {
            const o = ctx.createOscillator();
            o.type = "sawtooth";
            o.frequency.setValueAtTime(f0 * m, 0);
            o.frequency.exponentialRampToValueAtTime(f0 * m * 2.3, L);
            const lp = ctx.createBiquadFilter();
            lp.type = "lowpass";
            lp.Q.value = 1.5;
            lp.frequency.setValueAtTime(380, 0);
            lp.frequency.exponentialRampToValueAtTime(2800 * p.tension, L);
            const g = ctx.createGain();
            g.gain.setValueAtTime(0.001, 0);
            g.gain.exponentialRampToValueAtTime(0.16, L);
            g.gain.exponentialRampToValueAtTime(0.0001, L + 0.35);
            o.connect(lp).connect(g);
            out(g);
            o.start(0);
            o.stop(L + 0.5);
          });
        }
        return;
      }

      if (p.variant !== "Tonal Riser") {
        const src = noiseSrc(ctx, L + 0.05);
        const hp = ctx.createBiquadFilter();
        hp.type = "highpass";
        hp.frequency.setValueAtTime(150, 0);
        hp.frequency.exponentialRampToValueAtTime(3800 * p.pitch, L);
        hp.Q.value = 2 * p.tension;
        const g = ctx.createGain();
        g.gain.setValueAtTime(0.02, 0);
        g.gain.exponentialRampToValueAtTime(0.75, L);
        g.gain.linearRampToValueAtTime(0.0001, L + 0.03);
        src.connect(hp).connect(g).connect(ctx.destination);
        src.start(0);
      }
      if (p.variant !== "Noise Riser") {
        [0, 7, -7].forEach((det) => {
          const o = ctx.createOscillator();
          o.type = "sawtooth";
          o.detune.value = det * p.tension * 3;
          o.frequency.setValueAtTime(75 * p.pitch, 0);
          o.frequency.exponentialRampToValueAtTime(310 * p.pitch, L);
          const lp = ctx.createBiquadFilter();
          lp.type = "lowpass";
          lp.frequency.setValueAtTime(300, 0);
          lp.frequency.exponentialRampToValueAtTime(3000 * p.tension, L);
          const g = ctx.createGain();
          g.gain.setValueAtTime(0.001, 0);
          g.gain.exponentialRampToValueAtTime(0.22, L);
          g.gain.linearRampToValueAtTime(0.0001, L + 0.03);
          o.connect(lp).connect(g).connect(ctx.destination);
          o.start(0);
          o.stop(L + 0.1);
        });
      }
      if (p.variant === "Hybrid + Hit") {
        thump(ctx, L, 160 * p.pitch, 40, 0.4, 1.0, ctx.destination);
        noiseBurst(ctx, L, 0.12, 400, 1.2, 0.5, ctx.destination);
      }
    },
  },
  {
    id: "sub-drop",
    name: "Sub Drop",
    desc: "Mély puffanás hangsúlyos pillanatokhoz",
    variants: ["Clean", "Distorted", "808 Style", "Fall"],
    sliders: [
      { id: "len", label: "Hossz", min: 0.4, max: 2.5, step: 0.05, def: 1.1, unit: "s" },
      { id: "pitch", label: "Hangmagasság", min: 0.6, max: 1.8, step: 0.05, def: 1 },
      { id: "drive", label: "Torzítás", min: 1, max: 8, step: 0.5, def: 2 },
    ],
    duration: (p) => p.len + 0.2,
    build: (ctx, p) => {
      const v = p.variant;
      const f0 = (v === "Fall" ? 400 : v === "808 Style" ? 130 : 95) * p.pitch;
      const f1 = v === "Fall" ? 45 : 27;
      const o = ctx.createOscillator();
      o.type = "sine";
      o.frequency.setValueAtTime(f0, 0);
      o.frequency.exponentialRampToValueAtTime(f1, p.len);
      const g = ctx.createGain();
      g.gain.setValueAtTime(v === "808 Style" ? 1.1 : 0.9, 0.002);
      g.gain.exponentialRampToValueAtTime(0.0001, p.len);

/* ---------- WAV kódolás ---------- */

function bufferToWav(buffer) {
  const numCh = buffer.numberOfChannels;
  const len = buffer.length * numCh * 2 + 44;
  const ab = new ArrayBuffer(len);
  const view = new DataView(ab);
  const writeStr = (off, s) => { for (let i = 0; i < s.length; i++) view.setUint8(off + i, s.charCodeAt(i)); };
  writeStr(0, "RIFF");
  view.setUint32(4, len - 8, true);
  writeStr(8, "WAVE");
  writeStr(12, "fmt ");
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, numCh, true);
  view.setUint32(24, buffer.sampleRate, true);
  view.setUint32(28, buffer.sampleRate * numCh * 2, true);
  view.setUint16(32, numCh * 2, true);
  view.setUint16(34, 16, true);
  writeStr(36, "data");
  view.setUint32(40, buffer.length * numCh * 2, true);
  let off = 44;
  const chans = [];
  for (let c = 0; c < numCh; c++) chans.push(buffer.getChannelData(c));
  for (let i = 0; i < buffer.length; i++) {
    for (let c = 0; c < numCh; c++) {
      let s = Math.max(-1, Math.min(1, chans[c][i]));
      view.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7fff, true);
      off += 2;
    }
  }
  return new Blob([ab], { type: "audio/wav" });
}

/* ---------- normalizálás ---------- */

function normalize(buffer, target = 0.89) {
  let peak = 0;
  for (let c = 0; c < buffer.numberOfChannels; c++) {
    const d = buffer.getChannelData(c);
    for (let i = 0; i < d.length; i++) peak = Math.max(peak, Math.abs(d[i]));
  }
  if (peak > 0.0001) {
    const g = target / peak;
    for (let c = 0; c < buffer.numberOfChannels; c++) {
      const d = buffer.getChannelData(c);
      for (let i = 0; i < d.length; i++) d[i] *= g;
    }
  }
  return buffer;
}


/* ---------- alkalmazás-állapot és felület ---------- */

let catId = CATEGORIES[0].id;
const allParams = {};
CATEGORIES.forEach((c) => {
  allParams[c.id] = { variant: c.variants[0] };
  c.sliders.forEach((s) => (allParams[c.id][s.id] = s.def));
});

let audioCtx = null;
let cachedBuffer = null;
let dirty = true;
let rendering = false;
let currentSource = null;

const el = (id) => document.getElementById(id);
const cat = () => CATEGORIES.find((c) => c.id === catId);
const params = () => allParams[catId];

function invalidate() { dirty = true; cachedBuffer = null; drawWave(null); }

async function renderSound() {
  const p = params();
  const c = cat();
  const dur = Math.max(0.15, c.duration(p));
  const Offline = window.OfflineAudioContext || window.webkitOfflineAudioContext;
  const octx = new Offline(2, Math.ceil(SR * dur), SR);
  c.build(octx, p);
  const buf = await octx.startRendering();
  return normalize(buf);
}

async function ensureBuffer() {
  if (dirty || !cachedBuffer) {
    rendering = true; updateButtons();
    el('wavePh').textContent = 'GENERÁLÁS…';
    el('wavePh').style.display = 'flex';
    cachedBuffer = await renderSound();
    dirty = false; rendering = false; updateButtons();
    el('wavePh').style.display = 'none';
    drawWave(cachedBuffer);
  }
  return cachedBuffer;
}

function drawWave(buffer) {
  const cv = el('waveCanvas');
  const dpr = window.devicePixelRatio || 1;
  const w = cv.clientWidth, h = cv.clientHeight;
  cv.width = w * dpr; cv.height = h * dpr;
  const g = cv.getContext('2d');
  g.scale(dpr, dpr);
  g.clearRect(0, 0, w, h);
  if (!buffer) {
    el('wavePh').textContent = 'LEJÁTSZÁS UTÁN ITT JELENIK MEG A HULLÁMFORMA';
    el('wavePh').style.display = 'flex';
    return;
  }
  const d = buffer.getChannelData(0);
  const step = Math.max(1, Math.floor(d.length / w));
  g.strokeStyle = '#b79cff';
  g.lineWidth = 1.5;
  g.shadowColor = '#b79cff';
  g.shadowBlur = 8;
  g.beginPath();
  for (let x = 0; x < w; x++) {
    let min = 1, max = -1;
    const start = x * step;
    for (let i = 0; i < step && start + i < d.length; i++) {
      const v = d[start + i];
      if (v < min) min = v;
      if (v > max) max = v;
    }
    const y1 = h / 2 + min * (h / 2 - 4);
    const y2 = h / 2 + max * (h / 2 - 4);
    g.moveTo(x + 0.5, y1);
    g.lineTo(x + 0.5, Math.abs(y2 - y1) < 1 ? y1 - 1 : y2);
  }
  g.stroke();
}

async function play() {
  const AC = window.AudioContext || window.webkitAudioContext;
  if (!audioCtx) audioCtx = new AC();
  if (audioCtx.state === 'suspended') await audioCtx.resume();
  if (currentSource) { try { currentSource.stop(); } catch (e) {} }
  const buf = await ensureBuffer();
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.connect(audioCtx.destination);
  currentSource = src;
  src.start();
}

async function download() {
  const buf = await ensureBuffer();
  const blob = bufferToWav(buf);
  const name = params().variant.replace(/[\s/+]+/g, '-').toLowerCase() + '-' + cat().id + '.wav';
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = name;
  a.rel = 'noopener';
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 4000);
}

function randomize() {
  const c = cat(); const p = params();
  c.sliders.forEach((s) => {
    const raw = s.min + Math.random() * (s.max - s.min);
    p[s.id] = Math.round(raw / s.step) * s.step;
  });
  invalidate();
  renderSliders();
}

  el('btnPlay').disabled = rendering;

}

function renderSliders() {
  const c = cat(); const p = params();
  const box = el('sliders');
  box.innerHTML = '';
  c.sliders.forEach((s) => {
    const label = document.createElement('label');
    const head = document.createElement('div');
    head.className = 'slider-head';
    const nm = document.createElement('span');
    nm.textContent = s.label;
    const val = document.createElement('span');
    val.className = 'slider-val';
    const fmt = (x) => Number(x).toFixed(s.step < 1 ? 2 : 0) + (s.unit || '');
    val.textContent = fmt(p[s.id]);
    head.appendChild(nm); head.appendChild(val);
    const input = document.createElement('input');
    input.type = 'range';
    input.min = s.min; input.max = s.max; input.step = s.step;
    input.value = p[s.id];
    input.oninput = () => {
      p[s.id] = Number(input.value);
      val.textContent = fmt(p[s.id]);
      invalidate();
    };
    label.appendChild(head); label.appendChild(input);
    box.appendChild(label);
  });
}

function renderAll() {
  const c = cat();
  el('catName').textContent = c.name;
  el('catDesc').textContent = c.desc;
  renderCats();
  renderVariants();
  renderSliders();
}

el('btnPlay').onclick = play;
el('btnRand').onclick = randomize;
el('btnDl').onclick = download;
renderAll();
</script>
</body>
</html>
